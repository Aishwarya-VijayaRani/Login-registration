<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>

    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card p-4 shadow" style="width:400px">

            <h3 class="text-center mb-3">Login Page</h3>

            <form action="dashboard.html">

                <input type="text" class="form-control mb-3" placeholder="Username" required>

                <input type="password" class="form-control mb-3" placeholder="Password" required>
                <button class="btn btn-primary w-100">Login</button>
            </form>
            <div class="text-center mt-3">
                <a href="forgot.html">Forgot Password?</a><br>
                <a href="registration.html">Create New Account</a>
            </div>

        </div>
    </div>
    Username:<br>
    <input type="text" required><br><br>

    Password:<br>
    <input type="password" required><br><br>

    <button type="submit">Login</button>
</form>

<br>
<a href="forgot.html">Forgot Password?</a><br>
<a href="registration.html">Create New Account</a>

</body>
</html>
