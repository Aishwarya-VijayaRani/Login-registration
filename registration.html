<!DOCTYPE html>
<html>
<head>
    <title>Registeration Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card p-4 shadow" style="width:400px">
            <h3 class="text-center mb-3">Registration</h3>
            <form action="login.html">
                <input type="text" class="form-control mb-3" placeholder="Name" required>
                <input type="email" class="form-control mb-3" placeholder="Email" required>
                <input type="tel" class="form-control mb-3" placeholder="Phone Number" required>
                <input type="password" class="form-control mb-3" placeholder="Password" required>
                <input type="password" class="form-control mb-3" placeholder="Confirm Password" required>
                <button class="btn btn-success w-100">Register</button>
            </form>
            <div class="text-center mt-3">
                <a href="login.html">I already have an account</a>
            </div>
        </div>
    </div>
    Name:<br>
    <input type="text" required><br><br>

    Email:<br>
    <input type="email" required><br><br>

    Phone Number:<br>
    <input type="tel" required><br><br>

    Password:<br>
    <input type="password" required><br><br>

    Confirm Password:<br>
    <input type="password" required><br><br>

    <button type="submit">Register</button>
</form>

<br>
<a href="login.html">I already have an account</a>

</body>
</html>
